\* TLC config for WriteProtocol.tla
\*
\* 小规模模型: 1 client, 1 file, 3 DataNodes, 最多 3 个 block
\* 足够发现 pipeline write 中的一致性 bug
\*
\* 如需更大规模验证，逐步增大 Files/MaxBlockIndex
\* (注意: TLC 状态空间随规模指数增长)

SPECIFICATION Spec

CONSTANTS
    Clients = {1}
    Files = {1}
    DataNodes = {1, 2, 3}
    MinWriteReplica = 2
    MaxBlockIndex = 2

INVARIANTS
    WriteProtocolInvariants
