syntax = "proto3";

package pl.minitable.proto;

import "cpp/pl/minitable/proto/common.proto";

option cc_generic_services = true;

// =========================================================================
// MasterService — 客户端接口
// =========================================================================

service MasterService {
    // DDL
    rpc CreateTable(CreateTableRequest) returns (CreateTableResponse);
    rpc UpdateTable(UpdateTableRequest) returns (UpdateTableResponse);
    rpc DropTable(DropTableRequest) returns (DropTableResponse);
    rpc GetTable(GetTableRequest) returns (GetTableResponse);
    rpc ListTables(ListTablesRequest) returns (ListTablesResponse);

    // 分片
    rpc GetSlice(GetSliceRequest) returns (GetSliceResponse);
}

// =========================================================================
// CreateTable
// =========================================================================

message CreateTableRequest {
    string        namespace  = 1;
    string        table_name = 2;
    string        region     = 3;  // 所属 Region
    TableSchema   schema     = 4;
    PartitionSpec partition  = 5;
    uint32        replicas   = 6;  // 默认 3
}

message CreateTableResponse {
    Status    status = 1;
    TableInfo table  = 2;  // 包含分配的 table_id 和初始 version
}

// =========================================================================
// UpdateTable — 修改表定义 (加列/删列/加 LG 等)
// =========================================================================

message UpdateTableRequest {
    string        namespace        = 1;
    string        table_name       = 2;
    TableSchema   schema           = 3;  // 新的完整 schema
    uint64        expected_version = 4;  // 乐观锁: 仅当当前版本匹配时才执行
}

message UpdateTableResponse {
    Status    status = 1;
    TableInfo table  = 2;  // 更新后的完整信息 (含新 version)
}

// =========================================================================
// DropTable
// =========================================================================

message DropTableRequest {
    string namespace  = 1;
    string table_name = 2;
}

message DropTableResponse {
    Status status = 1;
}

// =========================================================================
// GetTable — 查询表定义
// =========================================================================

message GetTableRequest {
    string namespace  = 1;
    string table_name = 2;
}

message GetTableResponse {
    Status    status = 1;
    TableInfo table  = 2;
}

// =========================================================================
// ListTables
// =========================================================================

message ListTablesRequest {
    string namespace = 1;  // 空 = 列出所有 namespace 下的表
}

message ListTablesResponse {
    Status status = 1;
    repeated TableInfo tables = 2;
}

// =========================================================================
// GetSlice — 分片查询
// =========================================================================

message GetSliceRequest {
    string namespace  = 1;
    string table_name = 2;
    RowKey row_key    = 3;  // 非空: 定位单个 Slice; 空: 返回所有 Slice
}

message GetSliceResponse {
    Status status = 1;
    repeated SliceInfo slices = 2;
}
