syntax = "proto3";

package pl.minitable.master.proto;

option cc_generic_services = true;

// =========================================================================
// UnitService — Master ↔ UnitServer 内部通信
// =========================================================================

service UnitService {
    rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
    rpc RegisterUnitServer(RegisterUnitServerRequest) returns (RegisterUnitServerResponse);
}

// =========================================================================

message HeartbeatRequest {
    uint64 us_id = 1;
    string host = 2;
    uint32 port = 3;
    int64 capacity = 4;
    // 携带当前 US 上的 Slice 列表 (用于 Master 校验)
    repeated SliceReport slices = 5;
}

message SliceReport {
    uint64 slice_id = 1;
    bool is_leader = 2;
}

message HeartbeatResponse {
    int32 error_code = 1;
    // Master 可能携带指令
    repeated SliceCommand commands = 2;
}

message SliceCommand {
    enum CommandType {
        NONE = 0;
        START_SLICE = 1;     // 启动指定 Slice 的副本
        STOP_SLICE = 2;      // 停止指定 Slice 的副本
    }
    CommandType type = 1;
    uint64 slice_id = 2;
}

message RegisterUnitServerRequest {
    string host = 1;
    uint32 port = 2;
    int64 capacity = 3;
    string region = 4;
}

message RegisterUnitServerResponse {
    int32 error_code = 1;
    string error_msg = 2;
    uint64 us_id = 3;
}
