syntax = "proto3";

package pl.minitable.proto;

import "cpp/pl/minitable/proto/common.proto";

option cc_generic_services = true;

// =========================================================================
// UnitServerService — Master ↔ UnitServer 内部通信
// =========================================================================

service UnitServerService {
    rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
    rpc RegisterUnitServer(RegisterUnitServerRequest) returns (RegisterUnitServerResponse);
}

// =========================================================================
// Heartbeat
// =========================================================================

message SliceReport {
    uint64 slice_id   = 1;
    bool   is_primary = 2;  // 当前 US 在该 Slice 的 Raft 组中是否为 Leader
}

message SliceCommand {
    enum Type {
        NONE        = 0;
        START_SLICE = 1;  // 启动指定 Slice 的副本
        STOP_SLICE  = 2;  // 停止指定 Slice 的副本
    }
    Type   type     = 1;
    uint64 slice_id = 2;
}

message HeartbeatRequest {
    uint64 unit_server_id = 1;
    string host           = 2;
    uint32 port           = 3;
    int64  capacity       = 4;
    repeated SliceReport slices = 5;
}

message HeartbeatResponse {
    Status status = 1;
    repeated SliceCommand commands = 2;
}

// =========================================================================
// RegisterUnitServer
// =========================================================================

message RegisterUnitServerRequest {
    uint64 unit_server_id = 1;  // 0 = 新注册; >0 = 重启后重新注册 (保留原 id)
    string host           = 2;
    uint32 port           = 3;
    int64  capacity       = 4;
    string region         = 5;
}

message RegisterUnitServerResponse {
    Status status         = 1;
    uint64 unit_server_id = 2;  // 分配或确认的 UnitServer id
}
