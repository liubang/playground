// Created: 2026/06/21

// brpc-compatible proto for the echo service.
//
// Why a separate file instead of importing proto/echo/echo.proto?
//   - brpc requires cc_generic_services = true for codegen.
//   - gRPC's C++ plugin rejects cc_generic_services = true.
//   - The two options cannot coexist in the same .proto file.
//   - Using proto "import" would be ideal, but rules_proto_grpc_cpp's
//     cpp_proto_library does not automatically wire transitive cc deps
//     for imported proto_library targets, causing include path errors.
//
// The message definitions below are wire-compatible with proto/echo/echo.proto:
// field numbers, types, and enum ordinals match exactly.

syntax = "proto3";

package pl.brpc.echo;

option cc_generic_services = true;

// --- Echo ---

message EchoRequest {
  string message = 1;
  int64 timestamp_us = 2;
  map<string, string> headers = 3;
}

message EchoResponse {
  string message = 1;
  int64 original_timestamp = 2;
  int64 server_timestamp = 3;
  string server_id = 4;
}

// --- Health Check ---

message HealthRequest {
  string service = 1;
}

message HealthResponse {
  enum Status {
    UNKNOWN = 0;
    SERVING = 1;
    NOT_SERVING = 2;
  }
  Status status = 1;
  string server_id = 2;
  string version = 3;
  int64 uptime_seconds = 4;
}

// --- Service ---

service EchoService {
  rpc Echo(EchoRequest) returns (EchoResponse);
  rpc HealthCheck(HealthRequest) returns (HealthResponse);
}
