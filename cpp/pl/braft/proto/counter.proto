syntax = "proto3";

package pl.braft.proto;

option cc_generic_services = true;

// Snapshot of the counter state machine.
message Snapshot {
  int64 value = 1;
}

// Request to atomically add a value to the counter.
message FetchAddRequest {
  int64 value = 1;
}

// Response from the counter service.
message CounterResponse {
  bool success = 1;
  int64 value = 2;
  string redirect = 3;
}

// Request to get the current counter value.
message GetRequest {}

// A simple distributed counter service based on Raft consensus.
service CounterService {
  rpc fetch_add(FetchAddRequest) returns (CounterResponse);
  rpc get(GetRequest) returns (CounterResponse);
}
