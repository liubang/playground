services:
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    hostname: namenode
    restart: unless-stopped
    networks:
      - bigdata
    environment:
      - CLUSTER_NAME=test
    env_file:
      - ./hadoop.env
    ports:
      - "${INTERNAL_BIND_ADDR:-127.0.0.1}:9870:9870"
      - "${INTERNAL_BIND_ADDR:-127.0.0.1}:9000:9000"
    volumes:
      - namenode-data:/hadoop/dfs/name
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9870/"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '2'

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    hostname: datanode
    restart: unless-stopped
    networks:
      - bigdata
    environment:
      SERVICE_PRECONDITION: "namenode:9870"
    env_file:
      - ./hadoop.env
    depends_on:
      namenode:
        condition: service_healthy
    volumes:
      - datanode-data:/hadoop/dfs/data
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '2'

  mysql:
    image: mysql:8.3
    container_name: mysql
    hostname: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Run ./bootstrap.sh to generate .env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-metastore}
      MYSQL_USER: ${MYSQL_USER:-hive}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Run ./bootstrap.sh to generate .env}
    networks:
      - bigdata
    ports:
      - "${PUBLIC_BIND_ADDR:-127.0.0.1}:3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      # 使用 TCP，避免初始化阶段仅开放 Unix socket 的临时 MySQL 被误判为就绪。
      test: ["CMD-SHELL", "MYSQL_PWD=$${MYSQL_ROOT_PASSWORD} mysqladmin ping -h 127.0.0.1 -u root --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1'

  hivemetastore:
    image: apache/hive:4.0.0
    container_name: hivemetastore
    hostname: hivemetastore
    restart: unless-stopped
    environment:
      SERVICE_NAME: "metastore"
      DB_DRIVER: "mysql"
      SERVICE_OPTS: >
        -Xmx1G
        -Djavax.jdo.option.ConnectionDriverName=com.mysql.cj.jdbc.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-metastore}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
        -Djavax.jdo.option.ConnectionUserName=${MYSQL_USER:-hive}
        -Djavax.jdo.option.ConnectionPassword=${MYSQL_PASSWORD:?Run ./bootstrap.sh to generate .env}
    networks:
      - bigdata
    volumes:
      - ./hive/conf/core-site.xml:/opt/hive/conf/core-site.xml
      - ./hive/conf/hdfs-site.xml:/opt/hive/conf/hdfs-site.xml
      - ./hive/conf/hive-site.xml:/opt/hive/conf/hive-site.xml
      - ./hive/lib/mysql-connector-j-8.3.0.jar:/opt/hive/lib/mysql-connector-j.jar
    depends_on:
      mysql:
        condition: service_healthy
      namenode:
        condition: service_healthy
    ports:
      - "${INTERNAL_BIND_ADDR:-127.0.0.1}:9083:9083"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/9083' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '2'

  hiveserver2:
    image: apache/hive:4.0.0
    container_name: hiveserver2
    hostname: hiveserver2
    restart: unless-stopped
    environment:
      HIVE_SERVER2_THRIFT_PORT: 10000
      SERVICE_OPTS: "-Xmx1G -Dhive.metastore.uris=thrift://hivemetastore:9083"
      IS_RESUME: "true"
      SERVICE_NAME: "hiveserver2"
    networks:
      - bigdata
    volumes:
      - ./hive/conf/core-site.xml:/opt/hive/conf/core-site.xml
      - ./hive/conf/hdfs-site.xml:/opt/hive/conf/hdfs-site.xml
      - ./hive/conf/hive-site.xml:/opt/hive/conf/hive-site.xml
    depends_on:
      hivemetastore:
        condition: service_healthy
      namenode:
        condition: service_healthy
    ports:
      - "${INTERNAL_BIND_ADDR:-127.0.0.1}:10000:10000"
      - "${INTERNAL_BIND_ADDR:-127.0.0.1}:10002:10002"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/10000' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '2'

  spark-master:
    image: apache/spark:4.0.2-scala2.13-java17-python3-r-ubuntu
    container_name: spark-master
    restart: unless-stopped
    environment:
      SPARK_NO_DAEMONIZE: 1
    command: >
      /opt/spark/sbin/spark-daemon.sh start org.apache.spark.deploy.master.Master
    networks:
      - bigdata
    ports:
      - "${INTERNAL_BIND_ADDR:-127.0.0.1}:8080:8080"
      - "${INTERNAL_BIND_ADDR:-127.0.0.1}:7077:7077"
    volumes:
      - ./hive/conf/hive-site.xml:/opt/spark/conf/hive-site.xml
      - ./spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./spark/jars:/opt/spark/extra-jars:ro
      - ./extensions/spark/jars:/opt/spark/extensions:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '2'

  spark-worker:
    image: apache/spark:4.0.2-scala2.13-java17-python3-r-ubuntu
    container_name: spark-worker
    restart: unless-stopped
    environment:
      SPARK_NO_DAEMONIZE: 1
    command: >
      /opt/spark/sbin/spark-daemon.sh start org.apache.spark.deploy.worker.Worker 4 spark://spark-master:7077
    depends_on:
      spark-master:
        condition: service_healthy
    networks:
      - bigdata
    volumes:
      - ./hive/conf/hive-site.xml:/opt/spark/conf/hive-site.xml
      - ./spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./spark/jars:/opt/spark/extra-jars:ro
      - ./extensions/spark/jars:/opt/spark/extensions:ro
    ports:
      - "${INTERNAL_BIND_ADDR:-127.0.0.1}:8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 8g
          cpus: '4'

  trino-coordinator:
    image: local/trino:468-extensions
    build:
      context: .
      dockerfile: trino/Dockerfile
    container_name: trino-coordinator
    hostname: trino-coordinator
    restart: unless-stopped
    environment:
      TRINO_SHARED_SECRET: ${TRINO_SHARED_SECRET:?Run ./bootstrap.sh to generate .env}
      MYSQL_USER: ${MYSQL_USER:-hive}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Run ./bootstrap.sh to generate .env}
    volumes:
      - ./trino/etc-coordinator:/etc/trino
      - ./extensions/trino/catalogs:/etc/trino/catalog:ro
      - trino-coordinator-data:/data/trino
    command: /usr/lib/trino/bin/launcher run --etc-dir /etc/trino -Dnode.id=coordinator-1
    ports:
      - "${INTERNAL_BIND_ADDR:-127.0.0.1}:8099:8099"
    networks:
      - bigdata
    depends_on:
      mysql:
        condition: service_healthy
      hivemetastore:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8099/v1/info"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: '2'

  trino-worker-1:
    image: local/trino:468-extensions
    container_name: trino-worker-1
    hostname: trino-worker-1
    restart: unless-stopped
    environment:
      TRINO_SHARED_SECRET: ${TRINO_SHARED_SECRET:?Run ./bootstrap.sh to generate .env}
      MYSQL_USER: ${MYSQL_USER:-hive}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Run ./bootstrap.sh to generate .env}
    volumes:
      - ./trino/etc-worker1:/etc/trino
      - ./extensions/trino/catalogs:/etc/trino/catalog:ro
      - trino-worker-data:/data/trino
    command: /usr/lib/trino/bin/launcher run --etc-dir /etc/trino -Dnode.id=worker-1
    ports:
      - "${INTERNAL_BIND_ADDR:-127.0.0.1}:8199:8199"
    depends_on:
      mysql:
        condition: service_healthy
      trino-coordinator:
        condition: service_healthy
      hivemetastore:
        condition: service_healthy
    networks:
      - bigdata
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: '2'

volumes:
  namenode-data:
  datanode-data:
  mysql-data:
  trino-coordinator-data:
  trino-worker-data:

networks:
  bigdata:
