# Iceberg SQL Extensions
spark.sql.extensions                      org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions

# Framework dependencies and user-provided extensions on every Spark node
spark.driver.extraClassPath              /opt/spark/extra-jars/*:/opt/spark/extensions/*
spark.executor.extraClassPath            /opt/spark/extra-jars/*:/opt/spark/extensions/*

# Iceberg Catalog (backed by Hive Metastore)
spark.sql.catalog.iceberg                 org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.iceberg.type            hive
spark.sql.catalog.iceberg.warehouse       hdfs://namenode:9000/user/hive/warehouse

# Default catalog remains spark_catalog (Hive), switch via USE iceberg
