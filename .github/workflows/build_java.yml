---
name: build-java
on:
  push:
    branches:
      - main
    paths:
      - "MODULE.bazel"
      - "MODULE.bazel.lock"
      - ".bazelrc"
      - "bazel/**"
      - "java/**"
      - "maven_install.json"
      - ".github/workflows/build_java.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    name: java coverage
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v5

      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          repository-cache: true
          disk-cache: ${{ github.workflow }}-${{ runner.os }}

      - name: install lcov
        run: |
          sudo apt-get update
          sudo apt-get install -y lcov

      - name: coverage
        run: |
          bazel coverage \
            --config=ci \
            --combined_report=lcov \
            --instrumentation_filter="//java[/:]" \
            //java/...
          lcov --remove ./bazel-out/_coverage/_coverage_report.dat \
            'external/*' \
            --output-file /tmp/coverage_filtered.dat \
            --ignore-errors unused,negative
          genhtml --ignore-errors negative --output coverage-java /tmp/coverage_filtered.dat

      - name: generate coverage badge
        uses: ./.github/actions/coverage-badge
        with:
          lcov-file: /tmp/coverage_filtered.dat
          output-dir: coverage-java
          label: coverage-java

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        if: ${{ github.ref == 'refs/heads/main' }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./coverage-java
          publish_branch: coverage
          destination_dir: java
          keep_files: true
          user_name: "liubang"
          user_email: "it.liubang@gmail.com"
