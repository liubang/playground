---
name: build-cpp
on:
  push:
    branches:
      - main
    paths:
      - "MODULE.bazel"
      - "MODULE.bazel.lock"
      - ".bazelrc"
      - "bazel/**"
      - "cpp/**"
      - ".github/workflows/build_cpp.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-macos:
    name: test-macos
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5
      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          repository-cache: true
          disk-cache: ${{ github.workflow }}-${{ runner.os }}
      - name: Cache Homebrew packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /opt/homebrew/Cellar/llvm
            /opt/homebrew/Cellar/libomp
          key: ${{ runner.os }}-brew-llvm-libomp-${{ hashFiles('.github/workflows/build_cpp.yml') }}
          restore-keys: |
            ${{ runner.os }}-brew-llvm-libomp-
      - run: brew install llvm libomp pkg-config
      - name: run test
        run: |
          bazel test \
            --config=release \
            --config=ci \
            //cpp/...

  test-linux-clang:
    name: test-linux-clang
    runs-on: ubuntu-24.04
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: flux_test
          MYSQL_USER: flux
          MYSQL_PASSWORD: flux
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v5
      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          repository-cache: true
          disk-cache: ${{ github.workflow }}-${{ runner.os }}-clang
      - run: |
          sudo apt-get update
          sudo apt-get install -y nasm libomp-dev default-mysql-client
      - name: seed MySQL fixture
        run: |
          mysql \
            -h127.0.0.1 \
            -P3306 \
            -uflux \
            -pflux \
            flux_test \
            < cpp/pl/flux/examples/cross_source/mysql_metrics.sql
      - name: run test
        run: |
          bazel test \
            --config=release \
            --config=ci \
            --action_env=CC=clang-18 \
            --cxxopt=-stdlib=libstdc++ \
            --cxxopt=-Wno-error=unused-but-set-variable \
            --cxxopt=-Wno-error=unused-but-set-parameter \
            --linkopt=-stdlib=libstdc++ \
            --test_env=FLUX_MYSQL_TEST_DSN=mysql://flux:flux@127.0.0.1:3306/flux_test \
            -- //cpp/... -//cpp/pl/recall/embedding_server/...

  # gcc job: run coverage (which also executes all tests), then deploy report
  coverage-linux-gcc:
    name: coverage-linux-gcc
    runs-on: ubuntu-24.04
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: flux_test
          MYSQL_USER: flux
          MYSQL_PASSWORD: flux
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v5
      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          repository-cache: true
          disk-cache: ${{ github.workflow }}-${{ runner.os }}-gcc
      - run: |
          sudo apt-get update
          sudo apt-get install -y nasm libomp-dev lcov default-mysql-client
      - name: seed MySQL fixture
        run: |
          mysql \
            -h127.0.0.1 \
            -P3306 \
            -uflux \
            -pflux \
            flux_test \
            < cpp/pl/flux/examples/cross_source/mysql_metrics.sql
      - name: run coverage
        run: |
          bazel coverage \
            --config=release \
            --config=ci \
            --action_env=CC=gcc-14 \
            --linkopt=-fuse-ld=gold \
            --test_env=FLUX_MYSQL_TEST_DSN=mysql://flux:flux@127.0.0.1:3306/flux_test \
            --combined_report=lcov \
            --instrumentation_filter="//cpp/pl[/:]" \
            -- //cpp/... -//cpp/pl/recall/embedding_server/...
      - name: generate html report
        run: |
          lcov --remove ./bazel-out/_coverage/_coverage_report.dat \
            'external/*' \
            --output-file /tmp/coverage_filtered.dat \
            --ignore-errors unused,negative
          genhtml --ignore-errors negative --output coverage-cpp /tmp/coverage_filtered.dat
      - name: generate coverage badge
        uses: ./.github/actions/coverage-badge
        with:
          lcov-file: /tmp/coverage_filtered.dat
          output-dir: coverage-cpp
          label: coverage-cpp
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        if: ${{ github.ref == 'refs/heads/main' }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./coverage-cpp
          publish_branch: coverage
          destination_dir: cpp
          keep_files: true
          user_name: "liubang"
          user_email: "it.liubang@gmail.com"
