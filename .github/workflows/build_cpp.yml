---
name: build-cpp
on:
  push:
    branches:
      - main
    paths:
      - "MODULE.bazel"
      - "cpp/**"
      - ".github/workflows/build_cpp.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-macos:
    name: test-macos
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          repository-cache: true
          disk-cache: ${{ github.workflow }}-${{ runner.os }}
      - name: Cache Homebrew packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /opt/homebrew/Cellar/llvm
            /opt/homebrew/Cellar/libomp
          key: ${{ runner.os }}-brew-llvm-libomp-${{ hashFiles('.github/workflows/build_cpp.yml') }}
          restore-keys: |
            ${{ runner.os }}-brew-llvm-libomp-
      - run: |
          brew install llvm libomp pkg-config
      - name: run test
        run: |
          bazel test \
            --config=release \
            //cpp/...
  test-linux:
    strategy:
      matrix:
        compiler:
          [
            { name: gcc, flag: --action_env=CC=gcc-14 --linkopt=-fuse-ld=gold },
            {
              name: clang,
              flag: --action_env=CC=clang-18 --cxxopt=-stdlib=libstdc++ --cxxopt=-Wno-error=unused-but-set-variable --cxxopt=-Wno-error=unused-but-set-parameter --linkopt=-stdlib=libstdc++,
            },
          ]
    name: test-linux
    runs-on: ubuntu-24.04
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: flux_test
          MYSQL_USER: flux
          MYSQL_PASSWORD: flux
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          repository-cache: true
          disk-cache: ${{ github.workflow }}-${{ runner.os }}-${{ matrix.compiler.name }}
      - run: |
          sudo apt-get update
          sudo apt-get install -y nasm libomp-dev lcov default-mysql-client
      - name: seed MySQL fixture
        run: |
          mysql \
            -h127.0.0.1 \
            -P3306 \
            -uflux \
            -pflux \
            flux_test \
            < cpp/pl/flux/examples/cross_source/mysql_metrics.sql
      - name: run test
        run: |
          bazel test \
            --config=release \
            ${{ matrix.compiler.flag }} \
            --test_env=FLUX_MYSQL_TEST_DSN=mysql://flux:flux@127.0.0.1:3306/flux_test \
            //cpp/...
  coverage:
    name: coverage
    runs-on: ubuntu-24.04
    needs: [test-macos, test-linux]
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: flux_test
          MYSQL_USER: flux
          MYSQL_PASSWORD: flux
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          repository-cache: true
          disk-cache: ${{ github.workflow }}-${{ runner.os }}-gcc-coverage
      - run: |
          sudo apt-get update
          sudo apt-get install -y nasm libomp-dev lcov default-mysql-client
      - name: seed MySQL fixture
        run: |
          mysql \
            -h127.0.0.1 \
            -P3306 \
            -uflux \
            -pflux \
            flux_test \
            < cpp/pl/flux/examples/cross_source/mysql_metrics.sql
      - name: run coverage
        run: |
          bazel coverage \
            --config=release \
            --action_env=CC=gcc-14 \
            --test_env=FLUX_MYSQL_TEST_DSN=mysql://flux:flux@127.0.0.1:3306/flux_test \
            --verbose_failures \
            --combined_report=lcov \
            --instrument_test_targets \
            //cpp/...
          ls -lh ./bazel-out/_coverage/_coverage_report.dat
          genhtml --ignore-errors negative --output coverage ./bazel-out/_coverage/_coverage_report.dat
          cp -r ./registry ./coverage/
      - name: Deploy 🚀
        uses: peaceiris/actions-gh-pages@v4
        if: ${{ github.ref == 'refs/heads/main' }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./coverage
          publish_branch: coverage
          user_name: "liubang"
          user_email: "it.liubang@gmail.com"
