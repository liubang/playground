name: "Generate Coverage Badge"
description: "Generate a shields.io-compatible badge JSON from an lcov report, or a failure badge"

inputs:
  lcov-file:
    description: "Path to the lcov coverage report file"
    required: false
  output-dir:
    description: "Directory to write badge.json into"
    required: true
  label:
    description: "Badge label text"
    required: true
  status:
    description: "Build status: 'success' or 'failure'. When failure, generates a red 'failed' badge."
    required: false
    default: "success"

runs:
  using: "composite"
  steps:
    - name: generate badge
      shell: bash
      run: |
        mkdir -p "${{ inputs.output-dir }}"
        if [ "${{ inputs.status }}" = "failure" ]; then
          echo '{"schemaVersion":1,"label":"${{ inputs.label }}","message":"failed","color":"red"}' > "${{ inputs.output-dir }}/badge.json"
          echo "Badge: ${{ inputs.label }} failed (red)"
        else
          SUMMARY=$(lcov --rc branch_coverage=1 --summary "${{ inputs.lcov-file }}" 2>&1)
          COVERAGE=$(echo "$SUMMARY" | grep "lines" | awk '{print $2}' | tr -d '%')
          BRANCH=$(echo "$SUMMARY" | grep "branches" | awk '{print $2}' | tr -d '%')
          if [ "$(echo "$COVERAGE >= 80" | bc)" -eq 1 ]; then
            COLOR="brightgreen"
          elif [ "$(echo "$COVERAGE >= 60" | bc)" -eq 1 ]; then
            COLOR="yellow"
          else
            COLOR="red"
          fi
          if [ -n "$BRANCH" ] && [ "$BRANCH" != "" ]; then
            MSG="${COVERAGE}% (branch: ${BRANCH}%)"
          else
            MSG="${COVERAGE}%"
          fi
          echo "{\"schemaVersion\":1,\"label\":\"${{ inputs.label }}\",\"message\":\"${MSG}\",\"color\":\"${COLOR}\"}" > "${{ inputs.output-dir }}/badge.json"
          echo "Badge: ${{ inputs.label }} ${COVERAGE}% (branch: ${BRANCH:-N/A}%) [${COLOR}]"
        fi
