<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coverage Reports - playground</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@v2.16.0/devicon.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #f5f5f5;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      max-width: 800px;
      padding: 2rem;
    }
    h1 {
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
      color: #1a1a1a;
    }
    p {
      color: #666;
      margin-bottom: 2rem;
    }
    .cards {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 2rem 2.5rem;
      text-decoration: none;
      color: #333;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      transition: transform 0.2s, box-shadow 0.2s;
      min-width: 180px;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }
    .card .icon { font-size: 2.5rem; margin-bottom: 0.8rem; }
    .card .label { font-size: 1.1rem; font-weight: 600; }
    .card .desc { font-size: 0.85rem; color: #888; margin-top: 0.3rem; }
    footer {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Coverage Reports</h1>
    <p>Select a language to view its test coverage report.</p>
    <div class="cards">
      <a class="card" href="cpp/">
        <div class="icon"><i class="devicon-cplusplus-plain colored"></i></div>
        <div class="label">C++</div>
        <div class="desc">LCOV / gcov</div>
      </a>
      <a class="card" href="java/">
        <div class="icon"><i class="devicon-java-plain colored"></i></div>
        <div class="label">Java</div>
        <div class="desc">JaCoCo</div>
      </a>
      <a class="card" href="go/">
        <div class="icon"><i class="devicon-go-original-wordmark colored"></i></div>
        <div class="label">Go</div>
        <div class="desc">Bazel coverage</div>
      </a>
    </div>
    <footer>Auto-generated by CI workflows</footer>
  </div>
</body>
</html>
