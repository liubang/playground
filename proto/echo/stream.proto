// StreamService — streaming RPCs. Messages from message.proto.

syntax = "proto3";

package pl.grpc.proto;

option java_multiple_files = true;
option go_package = "github.com/liubang/playground/go/pl/grpc/echo/pb;pb";

import "proto/echo/message.proto";

service StreamService {
  rpc ServerStream(ServerStreamRequest) returns (stream StreamItem);
  rpc ClientStream(stream EchoRequest) returns (EchoSummary);
  rpc Chat(stream ChatMessage) returns (stream ChatMessage);
}
