syntax = "proto3";

package pl.grpc.proto;

option java_multiple_files = true;
option go_package = "github.com/liubang/playground/go/pl/grpc/echo/pb;pb";

// --- Unary Echo ---

message EchoRequest {
  string message = 1;
  int64 timestamp_us = 2;
  map<string, string> headers = 3;
}

message EchoResponse {
  string message = 1;
  int64 original_timestamp = 2;
  int64 server_timestamp = 3;
  string server_id = 4;
}

// --- Server Streaming ---

message ServerStreamRequest {
  string pattern = 1;      // Regex filter: keep items matching this pattern
  int32 max_responses = 2; // Max number of responses to return
}

message StreamItem {
  int32 index = 1;
  string content = 2;
}

// --- Client Streaming ---

message EchoSummary {
  int32 message_count = 1;
  repeated string messages = 2;
  int64 server_timestamp = 3;
  string server_id = 4;
}

// --- Bidirectional Chat ---

message ChatMessage {
  string sender = 1;
  string content = 2;
  int64 timestamp_us = 3;
}

// --- Health Check ---

message HealthRequest {
  string service = 1;
}

message HealthResponse {
  enum Status {
    UNKNOWN = 0;
    SERVING = 1;
    NOT_SERVING = 2;
  }
  Status status = 1;
  string server_id = 2;
  string version = 3;
  int64 uptime_seconds = 4;
}

service EchoService {
  rpc Echo(EchoRequest) returns (EchoResponse);
  rpc ServerStream(ServerStreamRequest) returns (stream StreamItem);
  rpc ClientStream(stream EchoRequest) returns (EchoSummary);
  rpc Chat(stream ChatMessage) returns (stream ChatMessage);
  rpc HealthCheck(HealthRequest) returns (HealthResponse);
}
