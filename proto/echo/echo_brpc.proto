// brpc EchoService (unary only). Messages imported from message.proto.
// cc_generic_services = true is required for brpc codegen but incompatible
// with the gRPC C++ plugin, so the brpc service lives in its own file.

syntax = "proto3";

package pl.brpc.echo;

option cc_generic_services = true;

import "proto/echo/message.proto";

service EchoService {
  rpc Echo(pl.grpc.proto.EchoRequest) returns (pl.grpc.proto.EchoResponse);
  rpc HealthCheck(pl.grpc.proto.HealthRequest) returns (pl.grpc.proto.HealthResponse);
}
